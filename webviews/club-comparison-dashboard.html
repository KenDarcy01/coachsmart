<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CoachSmart — Club Comparison</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root {
    --green:  #87C232;
    --dark:   #111418;
    --card:   #1E222B;
    --card2:  #252A35;
    --border: rgba(255,255,255,0.07);
    --text:   #E7EBEE;
    --muted:  #6B7280;
    --red:    #e05252;
    --amber:  #F5A623;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { font-family: 'DM Sans', sans-serif; background: var(--dark); color: var(--text); min-height: 100%; }

.topbar {
    background: var(--card); border-bottom: 1px solid var(--border);
    padding: 12px 24px; display: flex; align-items: center; gap: 14px;
    position: sticky; top: 0; z-index: 10;
}
.logo { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 3px; flex-shrink: 0; }
.logo span { color: var(--green); }
.topbar-divider { width: 1px; height: 20px; background: var(--border); flex-shrink: 0; }
.club-name { font-size: 15px; font-weight: 600; flex: 1; }

.filter-strip {
    background: var(--card); border-bottom: 1px solid var(--border);
    padding: 10px 24px 14px; position: sticky; top: 52px; z-index: 9;
}
.slider-dates { display: flex; justify-content: space-between; margin-bottom: 8px; }
.slider-dates span {
    font-size: 11px; font-weight: 500; background: var(--card2);
    padding: 3px 9px; border-radius: 5px; border: 1px solid var(--border);
}
.slider-wrap { position: relative; height: 26px; display: flex; align-items: center; margin-bottom: 10px; }
.slider-track { position: absolute; width: 100%; height: 3px; background: var(--border); border-radius: 2px; }
.slider-fill  { position: absolute; height: 3px; background: var(--green); border-radius: 2px; }
input[type=range] {
    position: absolute; width: 100%; height: 3px;
    background: transparent; -webkit-appearance: none; pointer-events: none;
}
input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 20px; height: 20px; border-radius: 50%;
    background: var(--green); border: 2px solid var(--dark);
    cursor: pointer; pointer-events: all; box-shadow: 0 0 0 4px rgba(135,194,50,0.15);
}
input[type=range]::-moz-range-thumb {
    width: 20px; height: 20px; border-radius: 50%;
    background: var(--green); border: 2px solid var(--dark); cursor: pointer; pointer-events: all;
}
.filter-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 10px; }
.filter-row select {
    background: var(--card2); color: var(--text); border: 1px solid var(--border);
    border-radius: 8px; padding: 6px 10px; font-size: 12px; font-weight: 500;
    font-family: 'DM Sans', sans-serif; cursor: pointer; outline: none;
}
.filter-row select:focus { border-color: var(--green); }
.filter-row select.on { border-color: var(--amber); color: var(--amber); }
.filter-row select:disabled { opacity: 0.35; }

/* ── Team chips ───────────────────────────────────────────────────── */
.team-chips-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
.team-chip {
    padding: 4px 11px; border-radius: 20px; font-size: 11px; font-weight: 600;
    border: 1px solid var(--border); background: var(--card2);
    color: var(--muted); cursor: pointer; white-space: nowrap;
    transition: all 0.15s; user-select: none;
}
.team-chip.active { background: rgba(135,194,50,0.12); border-color: var(--green); color: var(--green); }
.team-chip.no-data { opacity: 0.4; }

/* ── Attendee slider labels ───────────────────────────────────────── */
.att-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.filter-label { font-size: 10px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
.att-val { font-size: 11px; font-weight: 600; color: var(--text); }
.att-val span { color: var(--green); }

.page-body { max-width: 1200px; margin: 0 auto; padding: 20px 24px 40px; }

.tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 22px; }
.tab-btn {
    padding: 10px 22px; font-size: 13px; font-weight: 600; cursor: pointer;
    border: none; background: none; color: var(--muted);
    border-bottom: 2px solid transparent; font-family: 'DM Sans', sans-serif; transition: all 0.15s;
}
.tab-btn.active { color: var(--green); border-bottom-color: var(--green); }

.stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
@media (max-width: 700px) { .stats-row { grid-template-columns: repeat(2, 1fr); } }
.stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px 14px; text-align: center; }
.stat-value { font-family: 'Bebas Neue', sans-serif; font-size: 32px; letter-spacing: 1px; line-height: 1; }
.stat-value.green { color: var(--green); }
.stat-value.amber { color: var(--amber); }
.stat-value.red   { color: var(--red); }
.stat-value.sm    { font-size: 20px; }
.stat-label { font-size: 9px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 1.2px; margin-top: 5px; }

.charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
@media (max-width: 800px) { .charts-grid { grid-template-columns: 1fr; } }
.chart-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 18px 16px; }
.chart-title-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.chart-title { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
.chart-toggle-btn {
    font-size: 10px; font-weight: 600; padding: 3px 10px; border-radius: 20px;
    border: 1px solid var(--border); background: var(--card2); color: var(--muted);
    cursor: pointer; font-family: 'DM Sans', sans-serif; white-space: nowrap;
    transition: all 0.15s;
}
.chart-toggle-btn:hover { border-color: var(--green); color: var(--green); }
.chart-wrap { position: relative; }

.table-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; margin-bottom: 20px; }
.table-header { padding: 14px 18px 10px; border-bottom: 1px solid var(--border); }
.table-title { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
.table-scroll { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; }
thead th {
    padding: 10px 14px; font-size: 10px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 1px; color: var(--muted); text-align: left; border-bottom: 1px solid var(--border);
    cursor: pointer; white-space: nowrap; user-select: none;
}
thead th:hover { color: var(--text); }
thead th .sort-arrow { margin-left: 4px; opacity: 0.4; }
thead th.sort-active { color: var(--text); }
thead th.sort-active .sort-arrow { opacity: 1; }
tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: var(--card2); }
tbody td { padding: 10px 14px; font-size: 13px; white-space: nowrap; }
.rate-pill { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; }
.rate-pill.green { background: rgba(135,194,50,0.12); color: var(--green); }
.rate-pill.amber { background: rgba(245,166,35,0.12); color: var(--amber); }
.rate-pill.red   { background: rgba(224,82,82,0.12);  color: var(--red); }
.team-badge { font-size: 10px; padding: 2px 8px; border-radius: 10px; background: var(--card2); color: var(--muted); display: inline-block; }

.sort-bar { display: flex; align-items: center; gap: 7px; margin-bottom: 12px; flex-wrap: wrap; }
.sort-label { font-size: 10px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
.sort-chip {
    padding: 5px 11px; border-radius: 20px; font-size: 11px; font-weight: 600;
    border: 1px solid var(--border); background: var(--card); color: var(--muted);
    cursor: pointer; white-space: nowrap;
}
.sort-chip.active { background: var(--green); border-color: var(--green); color: #111418; }
.member-list { display: flex; flex-direction: column; gap: 6px; }
.member-row {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; padding: 11px 16px; display: flex; align-items: center; gap: 10px;
}
.member-name { font-size: 13px; font-weight: 500; min-width: 140px; }
.member-teams { display: flex; gap: 4px; flex-wrap: wrap; flex: 1; }
.member-stats { display: flex; gap: 14px; align-items: center; flex-shrink: 0; }
.member-stat { text-align: center; }
.member-stat-val { font-size: 13px; font-weight: 600; }
.member-stat-val.green { color: var(--green); }
.member-stat-val.amber { color: var(--amber); }
.member-stat-val.red   { color: var(--red); }
.member-stat-lbl { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; }

.state-center { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 200px; gap: 14px; }
.spinner { width: 30px; height: 30px; border: 2px solid var(--border); border-top-color: var(--green); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.state-text { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
.error-box { background: rgba(224,82,82,0.1); border: 1px solid rgba(224,82,82,0.3); border-radius: 10px; padding: 16px; color: #FCA5A5; font-size: 13px; }
.empty-state { text-align: center; padding: 32px 0; color: var(--muted); font-size: 13px; }
</style>
</head>
<body>

<div class="topbar">
    <div class="logo">COACH<span>SMART</span></div>
    <div class="topbar-divider"></div>
    <div class="club-name" id="clubName">Loading…</div>
</div>

<div class="filter-strip">
    <div class="slider-dates">
        <span id="sliderDateFrom">—</span>
        <span id="sliderDateTo">—</span>
    </div>
    <div class="slider-wrap">
        <div class="slider-track"></div>
        <div class="slider-fill" id="dateFill"></div>
        <input type="range" id="sliderFrom" min="0" max="12" value="3"  oninput="onDateSlider()">
        <input type="range" id="sliderTo"   min="0" max="12" value="12" oninput="onDateSlider()">
    </div>
    <div class="filter-row">
        <select id="filterCode" onchange="onFilterChange()" disabled><option value="all">All Codes</option></select>
        <select id="filterType" onchange="onFilterChange()" disabled><option value="all">All Types</option></select>
        <select id="filterRole" onchange="onFilterChange()" disabled><option value="all">All Roles</option></select>
    </div>
    <div class="team-chips-row" id="teamChipsRow"></div>
    <div class="att-header">
        <span class="filter-label">Avg Accepted per Event</span>
        <span class="att-val">Min <span id="attMinLabel">—</span> – Max <span id="attMaxLabel">—</span></span>
    </div>
    <div class="slider-wrap">
        <div class="slider-track"></div>
        <div class="slider-fill" id="attFill"></div>
        <input type="range" id="attFrom" min="0" max="100" value="0"   oninput="onAttSlider()" disabled>
        <input type="range" id="attTo"   min="0" max="100" value="100" oninput="onAttSlider()" disabled>
    </div>
</div>

<div class="page-body">
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('teams')">Teams</button>
        <button class="tab-btn" onclick="switchTab('members')">Members</button>
    </div>
    <div id="tabTeams">
        <div class="state-center"><div class="spinner"></div><div class="state-text">Loading…</div></div>
    </div>
    <div id="tabMembers" style="display:none">
        <div class="state-center"><div class="spinner"></div><div class="state-text">Loading…</div></div>
    </div>
</div>

<script>
const SUPABASE_URL      = 'https://gyfporsbdftvtakdvukt.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd5ZnBvcnNiZGZ0dnRha2R2dWt0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzMzMjkxMjAsImV4cCI6MjA0ODkwNTEyMH0.tuWJT4RCp3b7JHi6cdDogqgInetBHdTjSxhJQMBy5n4';
const H = { 'Content-Type':'application/json','apikey':SUPABASE_ANON_KEY,'Authorization':`Bearer ${SUPABASE_ANON_KEY}` };

const MAX_MONTHS = 12;
const urlParams  = new URLSearchParams(window.location.search);
const clubId     = parseInt(urlParams.get('club_id') || '0', 10);

let dashData       = null;
let activeCode     = 'all';
let activeType     = 'all';
let activeRole     = 'all';
let activeTeams    = new Set();
let activeTab      = 'teams';
let teamSortCol    = 'rate';
let teamSortDir    = -1;
let memberSortMode = 'rate_desc';
let chartMode      = 'rate';
let dateTimer      = null;
let resetAttSlider = true;
let chartRate      = null;
let chartStack     = null;

// ── Monthly date slider ───────────────────────────────────────────
function monthToDate(i) {
    const d = new Date();
    d.setDate(1);
    d.setMonth(d.getMonth() - (MAX_MONTHS - i));
    return d;
}
function getDateRange() {
    const from = +document.getElementById('sliderFrom').value;
    const to   = +document.getElementById('sliderTo').value;
    const s = new Date(monthToDate(from));
    s.setDate(1); s.setHours(0,0,0,0);
    const e = new Date(monthToDate(to));
    e.setMonth(e.getMonth() + 1); e.setDate(0); e.setHours(23,59,59,999);
    return { start: s.toISOString(), end: e.toISOString() };
}
function fmtMonth(d) {
    return d.toLocaleDateString('en-IE', { month: 'short', year: 'numeric' });
}
function updateDateUI() {
    const from = +document.getElementById('sliderFrom').value;
    const to   = +document.getElementById('sliderTo').value;
    document.getElementById('dateFill').style.left  = (from/MAX_MONTHS*100)+'%';
    document.getElementById('dateFill').style.width = ((to-from)/MAX_MONTHS*100)+'%';
    document.getElementById('sliderDateFrom').textContent = fmtMonth(monthToDate(from));
    document.getElementById('sliderDateTo').textContent   = fmtMonth(monthToDate(to));
}
function onDateSlider() {
    let f = +document.getElementById('sliderFrom').value;
    let t = +document.getElementById('sliderTo').value;
    if (f > t) { document.getElementById('sliderFrom').value=t; document.getElementById('sliderTo').value=f; }
    updateDateUI();
    clearTimeout(dateTimer);
    resetAttSlider = true;
    dateTimer = setTimeout(loadData, 600);
}

// ── Attendee slider ───────────────────────────────────────────────
function syncAttSlider(stats, forceReset) {
    const vals   = stats.map(t => t.avg_accepted_num);
    const newMax = vals.length ? Math.ceil(Math.max(...vals)) : 0;
    const fromEl = document.getElementById('attFrom');
    const toEl   = document.getElementById('attTo');
    fromEl.max = newMax; toEl.max = newMax;
    fromEl.disabled = toEl.disabled = (newMax === 0);
    if (forceReset) {
        fromEl.value = 0; toEl.value = newMax;
    } else {
        if (+fromEl.value > newMax) fromEl.value = newMax;
        if (+toEl.value   > newMax) toEl.value   = newMax;
    }
    updateAttUI(+fromEl.value, +toEl.value, newMax);
}
function updateAttUI(from, to, max) {
    const m = max || 1;
    document.getElementById('attFill').style.left  = (from/m*100)+'%';
    document.getElementById('attFill').style.width = ((to-from)/m*100)+'%';
    document.getElementById('attMinLabel').textContent = from;
    document.getElementById('attMaxLabel').textContent = to;
}
function onAttSlider() {
    let from = +document.getElementById('attFrom').value;
    let to   = +document.getElementById('attTo').value;
    if (from > to) {
        document.getElementById('attFrom').value = to;
        document.getElementById('attTo').value   = from;
        [from, to] = [to, from];
    }
    updateAttUI(from, to, +document.getElementById('attTo').max);
    if (dashData) renderTeams();
}
function applyAttFilter(stats) {
    const min = +document.getElementById('attFrom').value || 0;
    const max = +document.getElementById('attTo').value;
    if (isNaN(max)) return stats;
    return stats.filter(t => t.avg_accepted_num >= min && t.avg_accepted_num <= max);
}

// ── Team chips ────────────────────────────────────────────────────
function buildTeamChips(teams) {
    const withData = new Set(teams.filter(t => (t.events||[]).length > 0).map(t => t.team_id));
    activeTeams = withData.size === teams.length ? new Set() : new Set([...withData]);
    renderTeamChips(teams);
}
function renderTeamChips(teams) {
    const withData = new Set((dashData.teams||[]).filter(t => (t.events||[]).length > 0).map(t => t.team_id));
    document.getElementById('teamChipsRow').innerHTML = teams.map(t => {
        const active = activeTeams.size === 0 || activeTeams.has(t.team_id);
        const nd     = !withData.has(t.team_id);
        return `<span class="team-chip${active?' active':''}${nd?' no-data':''}" data-team-id="${t.team_id}" onclick="toggleTeamChip(${t.team_id})">${esc(t.team_name)}</span>`;
    }).join('');
}
function toggleTeamChip(teamId) {
    const allIds = (dashData.teams||[]).map(t => t.team_id);
    if (activeTeams.size === 0) {
        activeTeams = new Set(allIds.filter(id => id !== teamId));
    } else if (activeTeams.has(teamId)) {
        activeTeams.delete(teamId);
        if (activeTeams.size === 0) activeTeams = new Set(allIds); // prevent empty
    } else {
        activeTeams.add(teamId);
        if (activeTeams.size === allIds.length) activeTeams = new Set();
    }
    document.querySelectorAll('.team-chip').forEach(el => {
        el.classList.toggle('active', activeTeams.size === 0 || activeTeams.has(+el.dataset.teamId));
    });
    resetAttSlider = true;
    if (dashData) render();
}

// ── Code/Type/Role filters ────────────────────────────────────────
function populateSelect(id, opts, label) {
    const sel  = document.getElementById(id);
    const prev = sel.value;
    sel.innerHTML = `<option value="all">${label}</option>` +
        opts.map(v => `<option value="${esc(v)}"${v===prev?' selected':''}>${esc(v)}</option>`).join('');
    if (prev !== 'all' && !opts.includes(prev)) sel.value = 'all';
    sel.disabled = false;
    sel.classList.toggle('on', sel.value !== 'all');
}
function populateFilters(teams) {
    const allEvents = teams.flatMap(t => t.events || []);
    populateSelect('filterCode', [...new Set(allEvents.map(e=>e.code).filter(Boolean))].sort(), 'All Codes');
    populateSelect('filterType', [...new Set(allEvents.map(e=>e.type).filter(Boolean))].sort(), 'All Types');
    populateSelect('filterRole', [...new Set(allEvents.flatMap(e=>(e.members||[]).map(m=>m.role).filter(Boolean)))].sort(), 'All Roles');
    activeCode = document.getElementById('filterCode').value;
    activeType = document.getElementById('filterType').value;
    activeRole = document.getElementById('filterRole').value;
}
function onFilterChange() {
    activeCode = document.getElementById('filterCode').value;
    activeType = document.getElementById('filterType').value;
    activeRole = document.getElementById('filterRole').value;
    ['filterCode','filterType','filterRole'].forEach(id =>
        document.getElementById(id).classList.toggle('on', document.getElementById(id).value !== 'all'));
    resetAttSlider = true;
    if (dashData) render();
}

// ── Filter pipeline ───────────────────────────────────────────────
function filteredTeamStats() {
    let teams = dashData.teams || [];
    if (activeTeams.size) teams = teams.filter(t => activeTeams.has(t.team_id));

    return teams.map(t => {
        let events = t.events || [];
        if (activeCode !== 'all') events = events.filter(e => (e.code||'') === activeCode);
        if (activeType !== 'all') events = events.filter(e => (e.type||'') === activeType);

        const evts = events.map(e => {
            let members = e.members || [];
            if (activeRole !== 'all') members = members.filter(m => (m.role||'') === activeRole);
            return {
                ...e, members,
                accepted:    members.filter(m => m.response==='accepted').length,
                declined:    members.filter(m => m.response==='declined').length,
                no_response: members.filter(m => m.response==='no_response').length,
                total_members: members.length
            };
        });

        const totalAcc  = evts.reduce((s,e)=>s+(e.accepted||0),0);
        const totalDec  = evts.reduce((s,e)=>s+(e.declined||0),0);
        const totalNR   = evts.reduce((s,e)=>s+(e.no_response||0),0);
        const totalSlots= evts.reduce((s,e)=>s+(e.total_members||0),0);
        const uniq      = new Set(evts.flatMap(e=>e.members.map(m=>m.member_id)));
        const rate      = totalSlots > 0 ? Math.round(totalAcc/totalSlots*100) : 0;
        const avgAccNum = evts.length > 0 ? totalAcc / evts.length : 0;

        return {
            team_id:         t.team_id,
            team_name:       t.team_name,
            total_events:    evts.length,
            total_members:   uniq.size,
            accepted:        totalAcc,
            declined:        totalDec,
            no_response:     totalNR,
            rate,
            avg_accepted_num: avgAccNum,
            avg_accepted:    avgAccNum.toFixed(2),
        };
    });
}

function filteredMemberStats() {
    let teams = dashData.teams || [];
    if (activeTeams.size) teams = teams.filter(t => activeTeams.has(t.team_id));
    const map = new Map();
    teams.forEach(t => {
        let events = t.events || [];
        if (activeCode !== 'all') events = events.filter(e => (e.code||'') === activeCode);
        if (activeType !== 'all') events = events.filter(e => (e.type||'') === activeType);
        events.forEach(e => {
            let members = e.members || [];
            if (activeRole !== 'all') members = members.filter(m => (m.role||'') === activeRole);
            members.forEach(m => {
                if (!map.has(m.member_id)) map.set(m.member_id, { member_id:m.member_id, name:m.name, teams:new Set(), accepted:0, declined:0, no_response:0, total:0 });
                const r = map.get(m.member_id);
                r.teams.add(t.team_name); r.total++;
                if (m.response==='accepted') r.accepted++;
                else if (m.response==='declined') r.declined++;
                else r.no_response++;
            });
        });
    });
    return [...map.values()].map(m => ({ ...m, teams:[...m.teams], rate: m.total>0 ? Math.round(m.accepted/m.total*100) : 0 }));
}

// ── Render ────────────────────────────────────────────────────────
function render() {
    if (activeTab === 'teams') renderTeams();
    else renderMembers();
}

function renderTeams() {
    const stats  = filteredTeamStats();
    syncAttSlider(stats, resetAttSlider);
    resetAttSlider = false;
    const final  = applyAttFilter(stats);
    const el     = document.getElementById('tabTeams');

    if (!final.length) {
        el.innerHTML = '<div class="empty-state">No data for the selected filters.</div>';
        return;
    }

    const totalAcc   = final.reduce((s,t)=>s+t.accepted,0);
    const totalSlots = final.reduce((s,t)=>s+(t.accepted+t.declined+t.no_response),0);
    const avgRate    = totalSlots > 0 ? Math.round(totalAcc/totalSlots*100) : 0;
    const topTeam    = [...final].sort((a,b)=>b.rate-a.rate)[0];
    const sorted     = sortTeams([...final]);
    const toggleLbl  = chartMode === 'rate' ? 'Show Avg #' : 'Show Rate %';
    const chartTitle = chartMode === 'rate' ? 'Attendance Rate by Team' : 'Avg Accepted by Team';

    el.innerHTML = `
    <div class="stats-row">
        <div class="stat-card"><div class="stat-value">${final.length}</div><div class="stat-label">Teams</div></div>
        <div class="stat-card"><div class="stat-value">${final.reduce((s,t)=>s+t.total_events,0)}</div><div class="stat-label">Total Events</div></div>
        <div class="stat-card"><div class="stat-value ${rateColor(avgRate)}">${avgRate}%</div><div class="stat-label">Avg Rate</div></div>
        <div class="stat-card"><div class="stat-value sm green">${esc(topTeam?.team_name||'—')}</div><div class="stat-label">Top Team (${topTeam?.rate||0}%)</div></div>
    </div>

    <div class="charts-grid">
        <div class="chart-card">
            <div class="chart-title-row">
                <div class="chart-title">${chartTitle}</div>
                <button class="chart-toggle-btn" onclick="toggleChartMode()">${toggleLbl}</button>
            </div>
            <div class="chart-wrap"><canvas id="chartRate"></canvas></div>
        </div>
        <div class="chart-card">
            <div class="chart-title-row"><div class="chart-title">Responses by Team</div></div>
            <div class="chart-wrap"><canvas id="chartStack"></canvas></div>
        </div>
    </div>

    <div class="table-card">
        <div class="table-header"><div class="table-title">League Table</div></div>
        <div class="table-scroll">
        <table>
            <thead><tr>
                ${thHtml('team_name','Team')}
                ${thHtml('total_members','Members')}
                ${thHtml('total_events','Events')}
                ${thHtml('accepted','✓ Accepted')}
                ${thHtml('avg_accepted_num','Avg Accepted')}
                ${thHtml('declined','✗ Declined')}
                ${thHtml('no_response','? No Reply')}
                ${thHtml('rate','Rate %')}
            </tr></thead>
            <tbody>
                ${sorted.map(t => `
                <tr>
                    <td><strong>${esc(t.team_name)}</strong></td>
                    <td>${t.total_members}</td>
                    <td>${t.total_events}</td>
                    <td style="color:var(--green)">${t.accepted}</td>
                    <td style="color:var(--green)">${t.avg_accepted}</td>
                    <td style="color:var(--red)">${t.declined}</td>
                    <td style="color:var(--muted)">${t.no_response}</td>
                    <td><span class="rate-pill ${rateColor(t.rate)}">${t.rate}%</span></td>
                </tr>`).join('')}
            </tbody>
        </table>
        </div>
    </div>`;

    drawCharts(final);
}

function thHtml(col, label) {
    const arrow = teamSortCol===col ? (teamSortDir===1?'↑':'↓') : '↕';
    return `<th onclick="sortTeamTable('${col}')" class="${teamSortCol===col?'sort-active':''}">${label}<span class="sort-arrow">${arrow}</span></th>`;
}

function sortTeams(arr) {
    return arr.sort((a,b) => {
        const av = a[teamSortCol], bv = b[teamSortCol];
        if (typeof av === 'string') return teamSortDir * av.localeCompare(bv);
        return teamSortDir * ((bv||0)-(av||0));
    });
}
function sortTeamTable(col) {
    if (teamSortCol === col) teamSortDir *= -1;
    else { teamSortCol = col; teamSortDir = -1; }
    if (dashData) renderTeams();
}

function toggleChartMode() {
    chartMode = chartMode === 'rate' ? 'avg' : 'rate';
    if (dashData) renderTeams();
}

function drawCharts(stats) {
    if (chartRate) chartRate.destroy();
    if (chartStack) chartStack.destroy();

    const isRate = chartMode === 'rate';
    const sorted = [...stats].sort((a,b) => isRate ? a.rate-b.rate : a.avg_accepted_num-b.avg_accepted_num);
    const labels = sorted.map(t => t.team_name);
    const vals   = isRate ? sorted.map(t => t.rate) : sorted.map(t => +t.avg_accepted);
    const colors = isRate
        ? vals.map(v => v>=75?'#87C232':v>=50?'#F5A623':'#e05252')
        : vals.map(() => '#87C232');

    chartRate = new Chart(document.getElementById('chartRate'), {
        type: 'bar',
        data: { labels, datasets: [{ data: vals, backgroundColor: colors, borderRadius: 4, borderSkipped: false }] },
        options: {
            indexAxis: 'y', responsive: true,
            plugins: { legend: { display: false } },
            scales: {
                x: {
                    min: 0, ...(isRate ? {max:100} : {}),
                    ticks: { color:'#6B7280', font:{family:'DM Sans',size:10}, callback: v => isRate ? v+'%' : v.toFixed(1) },
                    grid: { color:'rgba(255,255,255,0.04)' }
                },
                y: { ticks: { color:'#E7EBEE', font:{family:'DM Sans',size:11} }, grid: { display:false } }
            }
        }
    });

    const byName = [...stats].sort((a,b)=>a.team_name.localeCompare(b.team_name));
    chartStack = new Chart(document.getElementById('chartStack'), {
        type: 'bar',
        data: {
            labels: byName.map(t=>t.team_name),
            datasets: [
                { label:'Accepted',    data:byName.map(t=>t.accepted),    backgroundColor:'rgba(135,194,50,0.7)',  borderRadius:2 },
                { label:'Declined',    data:byName.map(t=>t.declined),    backgroundColor:'rgba(224,82,82,0.7)',   borderRadius:2 },
                { label:'No Response', data:byName.map(t=>t.no_response), backgroundColor:'rgba(107,114,128,0.5)', borderRadius:2 }
            ]
        },
        options: {
            responsive: true,
            plugins: { legend: { labels: { color:'#6B7280', font:{family:'DM Sans',size:11}, boxWidth:12, padding:14 } } },
            scales: {
                x: { stacked:true, ticks:{color:'#E7EBEE',font:{family:'DM Sans',size:10}}, grid:{display:false} },
                y: { stacked:true, ticks:{color:'#6B7280',font:{family:'DM Sans',size:10}}, grid:{color:'rgba(255,255,255,0.04)'} }
            }
        }
    });
}

// ── Members tab ───────────────────────────────────────────────────
function renderMembers() {
    const members = filteredMemberStats();
    const el      = document.getElementById('tabMembers');
    if (!members.length) { el.innerHTML = '<div class="empty-state">No members for current filters.</div>'; return; }

    const totalAcc = members.reduce((s,m)=>s+m.accepted,0);
    const totalAll = members.reduce((s,m)=>s+m.total,0);
    const avgRate  = totalAll > 0 ? Math.round(totalAcc/totalAll*100) : 0;
    const top      = [...members].sort((a,b)=>b.rate-a.rate)[0];
    const mostAcc  = [...members].sort((a,b)=>b.accepted-a.accepted)[0];
    const sorted   = sortMembers([...members]);

    el.innerHTML = `
    <div class="stats-row">
        <div class="stat-card"><div class="stat-value">${members.length}</div><div class="stat-label">Members</div></div>
        <div class="stat-card"><div class="stat-value ${rateColor(avgRate)}">${avgRate}%</div><div class="stat-label">Avg Rate</div></div>
        <div class="stat-card"><div class="stat-value sm green">${esc(top?.name||'—')}</div><div class="stat-label">Top Rate (${top?.rate||0}%)</div></div>
        <div class="stat-card"><div class="stat-value sm green">${esc(mostAcc?.name||'—')}</div><div class="stat-label">Most Accepted (${mostAcc?.accepted||0})</div></div>
    </div>

    <div class="sort-bar">
        <span class="sort-label">Sort</span>
        <span class="sort-chip ${memberSortMode==='rate_desc'?'active':''}"  onclick="setMemberSort('rate_desc')">Rate ↓</span>
        <span class="sort-chip ${memberSortMode==='rate_asc'?'active':''}"   onclick="setMemberSort('rate_asc')">Rate ↑</span>
        <span class="sort-chip ${memberSortMode==='most_acc'?'active':''}"   onclick="setMemberSort('most_acc')">Most Accepted</span>
        <span class="sort-chip ${memberSortMode==='name'?'active':''}"       onclick="setMemberSort('name')">Name A–Z</span>
        <span class="sort-chip ${memberSortMode==='most_dec'?'active':''}"   onclick="setMemberSort('most_dec')">Most Declined</span>
        <span class="sort-chip ${memberSortMode==='no_resp'?'active':''}"    onclick="setMemberSort('no_resp')">No Response</span>
    </div>

    <div class="member-list">${sorted.map(m => memberRowHtml(m)).join('')}</div>`;
}

function memberRowHtml(m) {
    const c = rateColor(m.rate);
    return `<div class="member-row">
        <div class="member-name">${esc(m.name)}</div>
        <div class="member-teams">${m.teams.map(tn=>`<span class="team-badge">${esc(tn)}</span>`).join('')}</div>
        <div class="member-stats">
            <div class="member-stat"><div class="member-stat-val" style="color:var(--green)">${m.accepted}</div><div class="member-stat-lbl">✓</div></div>
            <div class="member-stat"><div class="member-stat-val" style="color:var(--red)">${m.declined}</div><div class="member-stat-lbl">✗</div></div>
            <div class="member-stat"><div class="member-stat-val" style="color:var(--muted)">${m.no_response}</div><div class="member-stat-lbl">?</div></div>
            <div class="member-stat"><div class="member-stat-val ${c}">${m.rate}%</div><div class="member-stat-lbl">Rate</div></div>
        </div>
    </div>`;
}

function sortMembers(arr) {
    switch (memberSortMode) {
        case 'rate_asc':  return arr.sort((a,b)=>a.rate-b.rate);
        case 'rate_desc': return arr.sort((a,b)=>b.rate-a.rate);
        case 'most_acc':  return arr.sort((a,b)=>b.accepted-a.accepted);
        case 'name':      return arr.sort((a,b)=>a.name.localeCompare(b.name));
        case 'most_dec':  return arr.sort((a,b)=>b.declined-a.declined);
        case 'no_resp':   return arr.sort((a,b)=>b.no_response-a.no_response);
        default: return arr;
    }
}
function setMemberSort(mode) { memberSortMode = mode; if (dashData) renderMembers(); }

// ── Tabs ──────────────────────────────────────────────────────────
function switchTab(tab) {
    activeTab = tab;
    document.querySelectorAll('.tab-btn').forEach((b,i) =>
        b.classList.toggle('active', (i===0&&tab==='teams')||(i===1&&tab==='members')));
    document.getElementById('tabTeams').style.display   = tab==='teams'   ? '' : 'none';
    document.getElementById('tabMembers').style.display = tab==='members' ? '' : 'none';
    if (dashData) render();
}

// ── Load ──────────────────────────────────────────────────────────
async function loadData() {
    document.getElementById('tabTeams').innerHTML   = `<div class="state-center"><div class="spinner"></div><div class="state-text">Loading…</div></div>`;
    document.getElementById('tabMembers').innerHTML = `<div class="state-center"><div class="spinner"></div><div class="state-text">Loading…</div></div>`;
    ['filterCode','filterType','filterRole','attFrom','attTo'].forEach(id => document.getElementById(id).disabled = true);
    if (!clubId) {
        document.getElementById('tabTeams').innerHTML = `<div class="error-box">No club_id supplied — add <code>?club_id=123</code> to the URL.</div>`;
        return;
    }
    try {
        const { start, end } = getDateRange();
        const r = await fetch(`${SUPABASE_URL}/rest/v1/rpc/get_club_comparison_dashboard`, {
            method:'POST', headers:H,
            body: JSON.stringify({ p_club_id:clubId, p_start_date:start, p_end_date:end })
        });
        if (!r.ok) throw new Error(`${r.status}: ${await r.text()}`);
        dashData = await r.json();
        if (dashData.error) { document.getElementById('tabTeams').innerHTML=`<div class="error-box">${esc(dashData.error)}</div>`; return; }
        document.getElementById('clubName').textContent = dashData.club_name || 'Club';
        document.title = `CoachSmart — ${dashData.club_name||'Club'}`;
        populateFilters(dashData.teams||[]);
        buildTeamChips(dashData.teams||[]);
        render();
    } catch(e) {
        document.getElementById('tabTeams').innerHTML = `<div class="error-box">Failed to load: ${esc(e.message)}</div>`;
    }
}

// ── Helpers ───────────────────────────────────────────────────────
function rateColor(r) { return r>=75?'green':r>=50?'amber':'red'; }
function esc(s) {
    return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Boot ──────────────────────────────────────────────────────────
window.addEventListener('load', () => {
    const mp = urlParams.get('months');
    if (mp !== null) {
        const m = Math.max(1, Math.min(MAX_MONTHS, parseInt(mp,10)));
        document.getElementById('sliderFrom').value = MAX_MONTHS - m;
    }
    updateDateUI();
    loadData();
});
</script>
</body>
</html>
