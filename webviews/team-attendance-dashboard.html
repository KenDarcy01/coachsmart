<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>CoachSmart — Attendance</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --green:  #87C232;
            --dark:   #111418;
            --card:   #1E222B;
            --card2:  #252A35;
            --border: rgba(255,255,255,0.07);
            --text:   #E7EBEE;
            --muted:  #6B7280;
            --red:    #e05252;
            --amber:  #F5A623;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        html, body {
            font-family: 'DM Sans', sans-serif;
            background: var(--dark);
            color: var(--text);
            height: 100%;
            overflow: hidden;
        }

        /* ── Slide container ──────────────────────────────────────────── */
        .views-wrapper {
            display: flex;
            width: 200%;
            height: 100vh;
            transition: transform 0.32s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        .views-wrapper.show-player { transform: translateX(-50%); }

        .view {
            width: 50%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── Header ───────────────────────────────────────────────────── */
        .header {
            background: var(--card);
            border-bottom: 1px solid var(--border);
            padding: 14px 18px;
            padding-top: calc(14px + env(safe-area-inset-top));
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }
        .logo {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 21px;
            letter-spacing: 3px;
            line-height: 1;
            flex-shrink: 0;
        }
        .logo span { color: var(--green); }
        .header-divider { width: 1px; height: 18px; background: var(--border); flex-shrink: 0; }
        .header-team {
            font-size: 14px;
            font-weight: 600;
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .back-btn {
            background: none; border: none;
            color: var(--green); font-size: 14px; font-weight: 600;
            font-family: 'DM Sans', sans-serif; cursor: pointer;
            display: flex; align-items: center; gap: 5px;
            padding: 0; flex-shrink: 0;
        }
        .back-btn svg { width: 15px; height: 15px; }

        /* ── Date-range tabs ──────────────────────────────────────────── */
        .range-tabs {
            display: flex;
            background: var(--card);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .range-tab {
            flex: 1; padding: 9px 4px;
            font-size: 12px; font-weight: 600;
            text-align: center; color: var(--muted); cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: color 0.15s, border-color 0.15s;
            letter-spacing: 0.5px;
        }
        .range-tab.active { color: var(--green); border-bottom-color: var(--green); }

        /* ── Scrollable view body ─────────────────────────────────────── */
        .view-content {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding: 16px;
            padding-bottom: calc(20px + env(safe-area-inset-bottom));
        }

        /* ── Stat cards ───────────────────────────────────────────────── */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 12px;
        }
        .stats-row.two-col { grid-template-columns: repeat(2, 1fr); }
        .stat-card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 12px; padding: 14px 10px; text-align: center;
        }
        .stat-value {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 30px; letter-spacing: 1px; color: var(--text); line-height: 1;
        }
        .stat-value.green { color: var(--green); }
        .stat-value.amber { color: var(--amber); }
        .stat-value.red   { color: var(--red); }
        .stat-value.muted { color: var(--muted); }
        .stat-label {
            font-size: 9px; font-weight: 500;
            color: var(--muted); text-transform: uppercase;
            letter-spacing: 1.2px; margin-top: 4px;
        }

        /* ── Squad health bar ─────────────────────────────────────────── */
        .health-card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 12px; padding: 14px 16px; margin-bottom: 12px;
        }
        .section-head {
            font-size: 10px; font-weight: 500; color: var(--muted);
            text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 10px;
        }
        .health-bar {
            height: 8px; border-radius: 4px; overflow: hidden;
            display: flex; background: var(--card2); margin-bottom: 8px;
        }
        .health-seg { height: 100%; min-width: 0; }
        .health-legend { display: flex; gap: 14px; flex-wrap: wrap; }
        .legend-item {
            display: flex; align-items: center; gap: 5px;
            font-size: 11px; color: var(--muted);
        }
        .legend-dot { width: 7px; height: 7px; border-radius: 50%; }

        /* ── Sort bar ─────────────────────────────────────────────────── */
        .sort-bar {
            display: flex; align-items: center; gap: 7px;
            margin-bottom: 10px;
            overflow-x: auto; -webkit-overflow-scrolling: touch;
            padding-bottom: 2px;
        }
        .sort-bar::-webkit-scrollbar { display: none; }
        .sort-label {
            font-size: 10px; font-weight: 500; color: var(--muted);
            text-transform: uppercase; letter-spacing: 1px; flex-shrink: 0;
        }
        .sort-chip {
            padding: 5px 11px; border-radius: 20px;
            font-size: 11px; font-weight: 600;
            border: 1px solid var(--border); background: var(--card);
            color: var(--muted); cursor: pointer; white-space: nowrap;
            transition: all 0.15s;
        }
        .sort-chip.active { background: var(--green); border-color: var(--green); color: #111418; }

        /* ── Player list ──────────────────────────────────────────────── */
        .player-list { display: flex; flex-direction: column; gap: 8px; }
        .player-row {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 12px; padding: 12px 14px;
            display: flex; align-items: center; gap: 10px;
            cursor: pointer; transition: background 0.15s;
            active: background var(--card2);
        }
        .player-row:active { background: var(--card2); }
        .player-row-left { flex: 1; min-width: 0; }
        .player-name {
            font-size: 14px; font-weight: 600;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
            margin-bottom: 4px;
        }
        .player-chips { display: flex; gap: 5px; flex-wrap: wrap; }
        .mini-chip {
            font-size: 10px; font-weight: 500;
            padding: 2px 7px; border-radius: 10px; background: var(--card2);
        }
        .mini-chip.green { color: var(--green); }
        .mini-chip.red   { color: var(--red); }
        .mini-chip.muted { color: var(--muted); }
        .player-row-right { text-align: right; flex-shrink: 0; }
        .rate-badge {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 26px; letter-spacing: 0.5px; line-height: 1;
        }
        .rate-badge.green { color: var(--green); }
        .rate-badge.amber { color: var(--amber); }
        .rate-badge.red   { color: var(--red); }
        .rate-bar-mini { width: 48px; height: 3px; border-radius: 2px; background: var(--card2); margin-top: 4px; margin-left: auto; }
        .rate-bar-fill { height: 3px; border-radius: 2px; }
        .chevron { color: var(--border); flex-shrink: 0; margin-left: 2px; }

        /* ── Rate hero (player detail) ────────────────────────────────── */
        .rate-hero {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 12px; padding: 16px 18px;
            display: flex; align-items: center; gap: 20px;
            margin-bottom: 4px;
        }
        .rate-hero-val {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 56px; letter-spacing: 2px; line-height: 1;
        }
        .rate-hero-val.green { color: var(--green); }
        .rate-hero-val.amber { color: var(--amber); }
        .rate-hero-val.red   { color: var(--red); }
        .rate-hero-right { flex: 1; }
        .rate-hero-bar-bg { height: 8px; background: var(--card2); border-radius: 4px; overflow: hidden; }
        .rate-hero-bar-fill { height: 8px; border-radius: 4px; }

        /* ── Event list (player detail) ───────────────────────────────── */
        .event-list { display: flex; flex-direction: column; gap: 8px; }
        .event-row {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 12px; padding: 12px 14px;
            display: flex; align-items: center; gap: 10px;
        }
        .event-row-left { flex: 1; min-width: 0; }
        .event-title {
            font-size: 13px; font-weight: 500;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
            margin-bottom: 3px;
        }
        .event-date { font-size: 11px; color: var(--muted); }
        .response-chip {
            font-size: 10px; font-weight: 700;
            padding: 3px 10px; border-radius: 10px;
            flex-shrink: 0; text-transform: uppercase; letter-spacing: 0.5px;
        }
        .response-chip.accepted  { background: rgba(135,194,50,0.12); color: var(--green); }
        .response-chip.declined  { background: rgba(224,82,82,0.12);  color: var(--red); }
        .response-chip.no-response { background: var(--card2); color: var(--muted); }

        /* ── Loading / Error states ───────────────────────────────────── */
        .state-center {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            min-height: 50vh; gap: 14px;
        }
        .spinner {
            width: 30px; height: 30px;
            border: 2px solid var(--border); border-top-color: var(--green);
            border-radius: 50%; animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .state-text {
            font-size: 11px; color: var(--muted);
            text-transform: uppercase; letter-spacing: 1px;
        }
        .error-box {
            background: rgba(224,82,82,0.1); border: 1px solid rgba(224,82,82,0.3);
            border-radius: 10px; padding: 16px;
            color: #FCA5A5; font-size: 13px; margin: 8px 0;
        }
    </style>
</head>
<body>

<div class="views-wrapper" id="viewsWrapper">

    <!-- ═══════════════════ VIEW 1 · Overview ═══════════════════ -->
    <div class="view">
        <div class="header">
            <div class="logo">COACH<span>SMART</span></div>
            <div class="header-divider"></div>
            <div class="header-team" id="teamName">Attendance</div>
        </div>

        <div class="range-tabs">
            <div class="range-tab" id="tab30"     onclick="setRange(30)">30d</div>
            <div class="range-tab" id="tab60"     onclick="setRange(60)">60d</div>
            <div class="range-tab" id="tab90"     onclick="setRange(90)">90d</div>
            <div class="range-tab" id="tabSeason" onclick="setRange(0)">Season</div>
        </div>

        <div class="view-content" id="overviewContent">
            <div class="state-center">
                <div class="spinner"></div>
                <div class="state-text">Loading…</div>
            </div>
        </div>
    </div>

    <!-- ═══════════════════ VIEW 2 · Player Detail ═══════════════════ -->
    <div class="view">
        <div class="header">
            <button class="back-btn" onclick="goBack()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                     stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="15 18 9 12 15 6"></polyline>
                </svg>
                Squad
            </button>
            <div class="header-divider"></div>
            <div class="header-team" id="playerName"></div>
        </div>

        <div class="view-content" id="playerContent"></div>
    </div>

</div>

<script>
const SUPABASE_URL      = 'https://gyfporsbdftvtakdvukt.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd5ZnBvcnNiZGZ0dnRha2R2dWt0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzMzMjkxMjAsImV4cCI6MjA0ODkwNTEyMH0.tuWJT4RCp3b7JHi6cdDogqgInetBHdTjSxhJQMBy5n4';
const H = {
    'Content-Type': 'application/json',
    'apikey': SUPABASE_ANON_KEY,
    'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
};

const params     = new URLSearchParams(window.location.search);
const teamId     = parseInt(params.get('team_id') || '0', 10);
const daysParam  = params.get('days');
const initDays   = daysParam !== null ? parseInt(daysParam, 10) : 90;

let dashData  = null;
let sortMode  = 'rate_desc';
let activeDays = 90;

// ── Helpers ────────────────────────────────────────────────────────────────
function getDateRange(days) {
    const end = new Date();
    end.setHours(23, 59, 59, 999);
    const start = days === 0
        ? new Date(end.getFullYear(), 0, 1)
        : (() => { const d = new Date(end); d.setDate(d.getDate() - days); d.setHours(0,0,0,0); return d; })();
    return { start: start.toISOString(), end: end.toISOString() };
}

function fmtDate(iso) {
    return new Date(iso).toLocaleDateString('en-IE', { day: '2-digit', month: 'short', year: 'numeric' });
}

function rateColor(rate) {
    if (rate >= 75) return 'green';
    if (rate >= 50) return 'amber';
    return 'red';
}

function esc(s) {
    return String(s ?? '')
        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── API ────────────────────────────────────────────────────────────────────
async function fetchDashboard(days) {
    const { start, end } = getDateRange(days);
    const r = await fetch(`${SUPABASE_URL}/rest/v1/rpc/get_team_attendance_dashboard`, {
        method: 'POST', headers: H,
        body: JSON.stringify({ p_team_id: teamId, p_start_date: start, p_end_date: end })
    });
    if (!r.ok) throw new Error(`${r.status}: ${await r.text()}`);
    return r.json();
}

// ── Tab selection ──────────────────────────────────────────────────────────
function setRange(days) {
    activeDays = days;
    ['30','60','90','Season'].forEach(k => document.getElementById(`tab${k}`).classList.remove('active'));
    document.getElementById(days === 0 ? 'tabSeason' : `tab${days}`).classList.add('active');
    loadOverview();
}

// ── Overview ───────────────────────────────────────────────────────────────
async function loadOverview() {
    const el = document.getElementById('overviewContent');
    el.innerHTML = `<div class="state-center"><div class="spinner"></div><div class="state-text">Loading…</div></div>`;

    if (!teamId) {
        el.innerHTML = `<div class="error-box">No team_id supplied. Add <code>?team_id=123</code> to the URL.</div>`;
        return;
    }
    try {
        dashData = await fetchDashboard(activeDays);
        if (dashData.error) { el.innerHTML = `<div class="error-box">${esc(dashData.error)}</div>`; return; }
        document.getElementById('teamName').textContent = dashData.team_name || 'Team';
        renderOverview(el);
    } catch(e) {
        el.innerHTML = `<div class="error-box">Failed to load: ${esc(e.message)}</div>`;
    }
}

function renderOverview(el) {
    const players = dashData.players || [];
    const total   = dashData.total_events || 0;

    if (!players.length) {
        el.innerHTML = `<div class="state-center"><div class="state-text">No players found for this range</div></div>`;
        return;
    }

    const avgRate = Math.round(players.reduce((s, p) => s + (p.attendance_rate || 0), 0) / players.length);
    const nGreen  = players.filter(p => (p.attendance_rate || 0) >= 75).length;
    const nAmber  = players.filter(p => (p.attendance_rate || 0) >= 50 && (p.attendance_rate || 0) < 75).length;
    const nRed    = players.length - nGreen - nAmber;
    const pct     = v => players.length ? Math.round(v / players.length * 100) : 0;

    const sorted = sortPlayers([...players]);

    el.innerHTML = `
        <div class="stats-row">
            <div class="stat-card">
                <div class="stat-value">${total}</div>
                <div class="stat-label">Events</div>
            </div>
            <div class="stat-card">
                <div class="stat-value ${rateColor(avgRate)}">${avgRate}%</div>
                <div class="stat-label">Avg Rate</div>
            </div>
            <div class="stat-card">
                <div class="stat-value">${players.length}</div>
                <div class="stat-label">Players</div>
            </div>
        </div>

        <div class="health-card">
            <div class="section-head">Squad Health</div>
            <div class="health-bar">
                <div class="health-seg" style="width:${pct(nGreen)}%; background:var(--green)"></div>
                <div class="health-seg" style="width:${pct(nAmber)}%; background:var(--amber)"></div>
                <div class="health-seg" style="width:${pct(nRed)}%;   background:var(--red)"></div>
            </div>
            <div class="health-legend">
                <div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div>${nGreen} &ge;75%</div>
                <div class="legend-item"><div class="legend-dot" style="background:var(--amber)"></div>${nAmber} 50–74%</div>
                <div class="legend-item"><div class="legend-dot" style="background:var(--red)"></div>${nRed} &lt;50%</div>
            </div>
        </div>

        <div class="sort-bar">
            <div class="sort-label">Sort</div>
            <div class="sort-chip ${sortMode==='rate_desc'?'active':''}"    onclick="setSortMode('rate_desc')">Rate ↓</div>
            <div class="sort-chip ${sortMode==='rate_asc'?'active':''}"     onclick="setSortMode('rate_asc')">Rate ↑</div>
            <div class="sort-chip ${sortMode==='name'?'active':''}"          onclick="setSortMode('name')">Name A–Z</div>
            <div class="sort-chip ${sortMode==='declined'?'active':''}"      onclick="setSortMode('declined')">Most Declined</div>
            <div class="sort-chip ${sortMode==='no_response'?'active':''}"   onclick="setSortMode('no_response')">No Response</div>
        </div>

        <div class="player-list">
            ${sorted.map(p => playerRowHtml(p)).join('')}
        </div>`;
}

function playerRowHtml(p) {
    const rate  = p.attendance_rate || 0;
    const col   = rateColor(rate);
    return `
        <div class="player-row" onclick="openPlayer(${p.member_id})">
            <div class="player-row-left">
                <div class="player-name">${esc(p.name)}</div>
                <div class="player-chips">
                    <span class="mini-chip green">${p.accepted} accepted</span>
                    <span class="mini-chip red">${p.declined} declined</span>
                    <span class="mini-chip muted">${p.no_response} no reply</span>
                </div>
            </div>
            <div class="player-row-right">
                <div class="rate-badge ${col}">${rate}%</div>
                <div class="rate-bar-mini">
                    <div class="rate-bar-fill" style="width:${rate}%; background:var(--${col})"></div>
                </div>
            </div>
            <svg class="chevron" width="13" height="13" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="9 18 15 12 9 6"></polyline>
            </svg>
        </div>`;
}

function sortPlayers(arr) {
    return arr.sort((a, b) => {
        switch (sortMode) {
            case 'rate_asc':    return (a.attendance_rate||0) - (b.attendance_rate||0);
            case 'rate_desc':   return (b.attendance_rate||0) - (a.attendance_rate||0);
            case 'name':        return (a.name||'').localeCompare(b.name||'');
            case 'declined':    return (b.declined||0) - (a.declined||0);
            case 'no_response': return (b.no_response||0) - (a.no_response||0);
            default: return 0;
        }
    });
}

function setSortMode(mode) {
    sortMode = mode;
    const el = document.getElementById('overviewContent');
    renderOverview(el);
}

// ── Player detail ──────────────────────────────────────────────────────────
function openPlayer(memberId) {
    if (!dashData) return;
    const p = (dashData.players || []).find(x => x.member_id === memberId);
    if (!p) return;
    document.getElementById('playerName').textContent = p.name;
    renderPlayerDetail(p);
    document.getElementById('viewsWrapper').classList.add('show-player');
    document.getElementById('playerContent').scrollTop = 0;
}

function goBack() {
    document.getElementById('viewsWrapper').classList.remove('show-player');
}

function renderPlayerDetail(p) {
    const rate   = p.attendance_rate || 0;
    const col    = rateColor(rate);
    const events = p.events || [];

    document.getElementById('playerContent').innerHTML = `
        <div class="stats-row two-col" style="margin-top:4px;">
            <div class="stat-card">
                <div class="stat-value">${p.total_events || 0}</div>
                <div class="stat-label">Events</div>
            </div>
            <div class="stat-card">
                <div class="stat-value green">${p.accepted}</div>
                <div class="stat-label">Accepted</div>
            </div>
            <div class="stat-card">
                <div class="stat-value red">${p.declined}</div>
                <div class="stat-label">Declined</div>
            </div>
            <div class="stat-card">
                <div class="stat-value muted">${p.no_response}</div>
                <div class="stat-label">No Reply</div>
            </div>
        </div>

        <div class="rate-hero">
            <div>
                <div class="rate-hero-val ${col}">${rate}%</div>
                <div class="stat-label" style="text-align:left;margin-top:5px;">Attendance Rate</div>
            </div>
            <div class="rate-hero-right">
                <div class="rate-hero-bar-bg">
                    <div class="rate-hero-bar-fill" style="width:${rate}%; background:var(--${col})"></div>
                </div>
            </div>
        </div>

        <div class="section-head" style="margin-top:16px;">Event History</div>
        <div class="event-list">
            ${events.length
                ? events.map(e => eventRowHtml(e)).join('')
                : '<div class="state-text" style="text-align:center;padding:24px 0">No events in this range</div>'}
        </div>`;
}

function eventRowHtml(e) {
    const cls   = e.response === 'accepted' ? 'accepted' : e.response === 'declined' ? 'declined' : 'no-response';
    const label = e.response === 'accepted' ? 'Accepted' : e.response === 'declined' ? 'Declined' : 'No Reply';
    return `
        <div class="event-row">
            <div class="event-row-left">
                <div class="event-title">${esc(e.title || '')}</div>
                <div class="event-date">${fmtDate(e.date)}</div>
            </div>
            <div class="response-chip ${cls}">${label}</div>
        </div>`;
}

// ── Boot ───────────────────────────────────────────────────────────────────
window.addEventListener('load', () => {
    activeDays = [30, 60, 90, 0].includes(initDays) ? initDays : 90;
    ['30','60','90','Season'].forEach(k => document.getElementById(`tab${k}`).classList.remove('active'));
    document.getElementById(activeDays === 0 ? 'tabSeason' : `tab${activeDays}`).classList.add('active');
    loadOverview();
});
</script>
</body>
</html>
