<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CoachSmart — Squad Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root {
    --green:  #87C232;
    --dark:   #111418;
    --card:   #1E222B;
    --card2:  #252A35;
    --border: rgba(255,255,255,0.07);
    --text:   #E7EBEE;
    --muted:  #6B7280;
    --red:    #e05252;
    --amber:  #F5A623;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { font-family: 'DM Sans', sans-serif; background: var(--dark); color: var(--text); min-height: 100%; }

/* Topbar */
.topbar { background: var(--card); border-bottom: 1px solid var(--border); padding: 12px 24px; display: flex; align-items: center; gap: 14px; position: sticky; top: 0; z-index: 20; }
.logo { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 3px; flex-shrink: 0; }
.logo span { color: var(--green); }
.tb-div { width: 1px; height: 20px; background: var(--border); flex-shrink: 0; }
.page-title { font-size: 14px; font-weight: 600; color: var(--muted); flex: 1; }
.tb-label { font-size: 13px; font-weight: 600; }
.topbar select { background: var(--card2); border: 1px solid var(--border); color: var(--text); padding: 6px 10px; border-radius: 6px; font-size: 13px; font-family: 'DM Sans', sans-serif; cursor: pointer; min-width: 200px; }
.topbar select:focus { outline: none; border-color: var(--green); }

/* Filter strip */
.filter-strip { background: var(--card); border-bottom: 1px solid var(--border); padding: 10px 24px 12px; position: sticky; top: 53px; z-index: 19; display: flex; flex-direction: column; gap: 10px; }
.fs-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.fs-label { font-size: 10px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.6px; white-space: nowrap; flex-shrink: 0; min-width: 44px; }
.slider-dates { display: flex; justify-content: space-between; margin-bottom: 2px; }
.slider-dates span { font-size: 11px; font-weight: 500; background: var(--card2); padding: 3px 9px; border-radius: 5px; border: 1px solid var(--border); }
.slider-wrap { position: relative; height: 26px; display: flex; align-items: center; flex: 1; min-width: 160px; }
.slider-track { position: absolute; width: 100%; height: 3px; background: var(--border); border-radius: 2px; }
.slider-fill  { position: absolute; height: 3px; background: var(--green); border-radius: 2px; }
input[type=range] { position: absolute; width: 100%; height: 3px; background: transparent; -webkit-appearance: none; pointer-events: none; }
input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: var(--green); border: 2px solid var(--dark); cursor: pointer; pointer-events: all; box-shadow: 0 0 0 4px rgba(135,194,50,0.15); }
input[type=range]::-moz-range-thumb { width: 18px; height: 18px; border-radius: 50%; background: var(--green); border: 2px solid var(--dark); cursor: pointer; pointer-events: all; }
.chip-group { display: flex; gap: 5px; flex-wrap: wrap; }
.t-chip { padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 500; border: 1px solid var(--border); background: var(--card2); cursor: pointer; transition: all 0.15s; user-select: none; white-space: nowrap; }
.t-chip.active { background: var(--green); color: #111; border-color: var(--green); }
.s-chip { padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 500; border: 1px solid var(--border); background: var(--card2); cursor: pointer; transition: all 0.15s; user-select: none; white-space: nowrap; }
.s-chip.active { background: rgba(135,194,50,0.18); color: var(--green); border-color: rgba(135,194,50,0.45); }

/* Main */
.main { max-width: 1400px; margin: 0 auto; padding: 24px; }

/* KPIs */
.kpi-row { display: grid; grid-template-columns: repeat(4,1fr); gap: 14px; margin-bottom: 24px; }
.kpi-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 18px 20px; }
.kpi-label { font-size: 11px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
.kpi-value { font-size: 28px; font-weight: 600; line-height: 1; }
.kpi-value.green { color: var(--green); }
.kpi-value.amber { color: var(--amber); }
.kpi-sub { font-size: 11px; color: var(--muted); margin-top: 5px; }

/* Chart card */
.chart-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 20px; margin-bottom: 24px; }
.chart-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 8px; }
.chart-head h3 { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
.tog-row { display: flex; gap: 8px; }
.tog-group { display: flex; background: var(--card2); border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
.tog { padding: 4px 11px; font-size: 11px; font-weight: 500; color: var(--muted); background: transparent; border: none; cursor: pointer; transition: all 0.15s; font-family: 'DM Sans', sans-serif; white-space: nowrap; }
.tog.active { background: var(--green); color: #111; }
.bar-wrap { position: relative; overflow: hidden; }

/* Team sections */
.team-section { margin-bottom: 28px; }
.team-section-header { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
.team-section-name { font-size: 16px; font-weight: 600; }
.team-section-meta { font-size: 12px; color: var(--muted); }
.team-color-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.squads-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }

/* Squad card */
.squad-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    padding: 16px 18px; cursor: pointer; transition: border-color 0.15s, background 0.15s;
    position: relative; overflow: hidden;
}
.squad-card:hover { border-color: rgba(135,194,50,0.4); background: var(--card2); }
.squad-card-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 10px; }
.squad-name { font-size: 14px; font-weight: 600; line-height: 1.3; }
.code-badge { font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 4px; background: var(--card2); border: 1px solid var(--border); white-space: nowrap; flex-shrink: 0; margin-left: 8px; }
.squad-stats-row { display: flex; gap: 16px; margin-bottom: 12px; }
.squad-stat { }
.squad-stat-val { font-size: 20px; font-weight: 600; line-height: 1; }
.squad-stat-val.green { color: var(--green); }
.squad-stat-lbl { font-size: 10px; color: var(--muted); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.4px; }
.rate-bar-bg { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; margin-bottom: 4px; }
.rate-bar-fill { height: 100%; border-radius: 2px; background: var(--green); transition: width 0.4s ease; }
.rate-bar-fill.amber { background: var(--amber); }
.rate-bar-fill.red   { background: var(--red); }
.rate-label { font-size: 11px; color: var(--muted); display: flex; justify-content: space-between; }

/* Empty squad state */
.no-squads { padding: 40px 20px; text-align: center; color: var(--muted); font-size: 13px; background: var(--card); border: 1px solid var(--border); border-radius: 10px; }

/* Detail panel */
.d-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 30; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
.d-overlay.open { opacity: 1; pointer-events: all; }
.d-panel { position: fixed; top: 0; right: -560px; width: 540px; height: 100vh; background: var(--card); border-left: 1px solid var(--border); z-index: 31; display: flex; flex-direction: column; transition: right 0.25s ease; }
.d-panel.open { right: 0; }
.d-head { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: flex-start; gap: 12px; flex-shrink: 0; }
.d-head-info { flex: 1; min-width: 0; }
.d-title { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
.d-meta  { font-size: 12px; color: var(--muted); }
.d-close { width: 28px; height: 28px; border-radius: 6px; background: var(--card2); border: 1px solid var(--border); color: var(--text); font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.d-close:hover { background: rgba(255,255,255,0.07); }
.d-stats { display: flex; gap: 20px; padding: 12px 20px; border-bottom: 1px solid var(--border); flex-shrink: 0; flex-wrap: wrap; }
.d-stat-item { }
.d-stat-val { font-size: 18px; font-weight: 600; }
.d-stat-val.green { color: var(--green); }
.d-stat-val.amber { color: var(--amber); }
.d-stat-lbl { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.4px; margin-top: 1px; }
.d-sort-row { display: flex; gap: 6px; padding: 10px 20px; border-bottom: 1px solid var(--border); flex-shrink: 0; flex-wrap: wrap; align-items: center; }
.d-sort-lbl { font-size: 11px; color: var(--muted); }
.d-sort-btn { padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 500; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; font-family: 'DM Sans', sans-serif; }
.d-sort-btn.active { background: var(--card2); color: var(--text); border-color: rgba(255,255,255,0.15); }
.d-list { flex: 1; overflow-y: auto; }
.d-member { display: flex; align-items: center; gap: 10px; padding: 10px 20px; border-bottom: 1px solid var(--border); }
.d-member:last-child { border-bottom: none; }
.d-member:hover { background: var(--card2); }
.d-av { width: 34px; height: 34px; border-radius: 50%; background: var(--card2); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; flex-shrink: 0; color: var(--muted); }
.d-info { flex: 1; min-width: 0; }
.d-nm { font-size: 13px; font-weight: 500; }
.d-rl { font-size: 11px; color: var(--muted); }
.d-cols { display: flex; gap: 14px; flex-shrink: 0; text-align: right; }
.d-col { min-width: 40px; }
.d-col-val { font-size: 13px; font-weight: 600; }
.d-col-val.green { color: var(--green); }
.d-col-val.amber { color: var(--amber); }
.d-col-lbl { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.3px; }

.loading-wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 80px 20px; gap: 14px; }
.spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--green); border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.empty-state { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 14px; }

@media (max-width: 900px) {
    .kpi-row { grid-template-columns: repeat(2,1fr); }
    .d-panel { width: 100vw; right: -100vw; }
    .d-cols  { gap: 8px; }
}
@media (max-width: 600px) {
    .main { padding: 14px; }
    .topbar, .filter-strip { padding-left: 14px; padding-right: 14px; }
    .squads-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
}
</style>
</head>
<body>

<div class="topbar">
    <div class="logo">Coach<span>Smart</span></div>
    <div class="tb-div"></div>
    <div class="page-title">Squad Dashboard</div>
    <span class="tb-label" id="ctxLabel" style="display:none;"></span>
    <div id="clubWrap">
        <select id="clubSelect" onchange="onClubChange()"><option value="">Select Club…</option></select>
    </div>
</div>

<div class="filter-strip">
    <div>
        <div class="slider-dates">
            <span id="dateFrom">—</span>
            <span id="dateTo">—</span>
        </div>
        <div class="slider-wrap">
            <div class="slider-track"></div>
            <div class="slider-fill" id="dateFill"></div>
            <input type="range" id="sliderFrom" min="0" max="12" value="3" oninput="onDateSlider()">
            <input type="range" id="sliderTo"   min="0" max="12" value="12" oninput="onDateSlider()">
        </div>
    </div>
    <div class="fs-row" id="teamRow">
        <span class="fs-label">Teams</span>
        <div class="chip-group" id="teamChips"></div>
    </div>
    <div class="fs-row">
        <span class="fs-label">Code</span>
        <div class="chip-group" id="codeChips"></div>
    </div>
</div>

<div class="main">
    <div class="loading-wrap" id="loading" style="display:none;">
        <div class="spinner"></div>
        <div style="color:var(--muted);font-size:13px;">Loading squads…</div>
    </div>

    <div id="dashContent" style="display:none;">
        <div class="kpi-row">
            <div class="kpi-card">
                <div class="kpi-label">Total Squads</div>
                <div class="kpi-value green" id="kpiSquads">—</div>
                <div class="kpi-sub" id="kpiSquadsSub"></div>
            </div>
            <div class="kpi-card">
                <div class="kpi-label">Players Assigned</div>
                <div class="kpi-value green" id="kpiPlayers">—</div>
                <div class="kpi-sub" id="kpiPlayersSub"></div>
            </div>
            <div class="kpi-card">
                <div class="kpi-label">Match Appearances</div>
                <div class="kpi-value" id="kpiApps">—</div>
                <div class="kpi-sub" id="kpiAppsSub"></div>
            </div>
            <div class="kpi-card">
                <div class="kpi-label">Avg Acceptance Rate</div>
                <div class="kpi-value amber" id="kpiRate">—</div>
                <div class="kpi-sub" id="kpiRateSub"></div>
            </div>
        </div>

        <div class="chart-card">
            <div class="chart-head">
                <h3>Squad Comparison</h3>
                <div class="tog-row">
                    <div class="tog-group" id="barTog">
                        <button class="tog active" onclick="setBarMode('members')">Members</button>
                        <button class="tog"        onclick="setBarMode('appearances')">Match Apps</button>
                        <button class="tog"        onclick="setBarMode('rate')">Acc. Rate</button>
                    </div>
                </div>
            </div>
            <div class="bar-wrap" id="barWrap">
                <canvas id="chartBar"></canvas>
            </div>
        </div>

        <div id="teamSections"></div>
    </div>

    <div class="empty-state" id="emptyState">Select a club above to load squad data.</div>
</div>

<div class="d-overlay" id="dOverlay" onclick="closeDetail()"></div>
<div class="d-panel" id="dPanel">
    <div class="d-head">
        <div class="d-head-info">
            <div class="d-title" id="dTitle"></div>
            <div class="d-meta"  id="dMeta"></div>
        </div>
        <button class="d-close" onclick="closeDetail()">×</button>
    </div>
    <div class="d-stats" id="dStats"></div>
    <div class="d-sort-row">
        <span class="d-sort-lbl">Sort:</span>
        <button class="d-sort-btn active" id="dsort-name"       onclick="setDetailSort('name')">Name</button>
        <button class="d-sort-btn"        id="dsort-accepted"   onclick="setDetailSort('accepted')">Accepted</button>
        <button class="d-sort-btn"        id="dsort-rate"       onclick="setDetailSort('rate')">Rate</button>
        <button class="d-sort-btn"        id="dsort-match_selections" onclick="setDetailSort('match_selections')">Match Apps</button>
    </div>
    <div class="d-list" id="dList"></div>
</div>

<script>
const SUPABASE_URL      = 'https://gyfporsbdftvtakdvukt.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd5ZnBvcnNiZGZ0dnRha2R2dWt0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzMzMjkxMjAsImV4cCI6MjA0ODkwNTEyMH0.tuWJT4RCp3b7JHi6cdDogqgInetBHdTjSxhJQMBy5n4';
const H = { 'Content-Type':'application/json', 'apikey':SUPABASE_ANON_KEY, 'Authorization':`Bearer ${SUPABASE_ANON_KEY}` };

const MAX_MONTHS = 12;
const PALETTE    = ['#87C232','#60a5fa','#F5A623','#a78bfa','#e05252','#34d399','#fb923c','#f472b6'];

const QS        = new URLSearchParams(location.search);
const paramClub = QS.get('club_id') ? parseInt(QS.get('club_id')) : null;
const paramTeam = QS.get('team_id') ? parseInt(QS.get('team_id')) : null;

let dashData   = null;
let chartBar   = null;
let detailSq   = null, detailSort = 'name', detailAsc = true;
let fTeams     = new Set();
let fCode      = '';
let allCodes   = [];
let barMode    = 'members';

// ── Helpers ───────────────────────────────────────────────────────
function esc(s) { return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtMonth(d) { return d.toLocaleDateString('en-IE',{month:'short',year:'numeric'}); }
function fmtDate(d)  { return new Date(d).toLocaleDateString('en-IE',{day:'numeric',month:'short',year:'numeric'}); }
function rateColor(r) { return r >= 70 ? 'green' : r >= 45 ? 'amber' : 'red'; }

// ── Date slider ───────────────────────────────────────────────────
function monthToDate(i) { const d = new Date(); d.setDate(1); d.setMonth(d.getMonth()-(MAX_MONTHS-i)); return d; }
function getDateRange() {
    const f = parseInt(document.getElementById('sliderFrom').value);
    const t = parseInt(document.getElementById('sliderTo').value);
    const start = monthToDate(f);
    const end   = monthToDate(t); end.setMonth(end.getMonth()+1); end.setDate(0);
    return { start, end };
}
function onDateSlider() {
    let f = parseInt(document.getElementById('sliderFrom').value);
    let t = parseInt(document.getElementById('sliderTo').value);
    if (f >= t) { if (document.activeElement===document.getElementById('sliderFrom')) f=t-1; else t=f+1; document.getElementById('sliderFrom').value=f; document.getElementById('sliderTo').value=t; }
    const {start,end} = getDateRange();
    document.getElementById('dateFrom').textContent = fmtMonth(start);
    document.getElementById('dateTo').textContent   = fmtMonth(end);
    const p1=f/MAX_MONTHS*100, p2=t/MAX_MONTHS*100;
    document.getElementById('dateFill').style.left  = p1+'%';
    document.getElementById('dateFill').style.width = (p2-p1)+'%';
    if (dashData) loadDashboard();
}

// ── Club loading ──────────────────────────────────────────────────
async function loadClubs() {
    if (paramClub) {
        document.getElementById('clubWrap').style.display = 'none';
        loadDashboard();
        return;
    }
    try {
        const r = await fetch(`${SUPABASE_URL}/rest/v1/clubs?select=club_id,club_name&order=club_name`,{headers:H});
        const clubs = await r.json();
        if (!Array.isArray(clubs)) return;
        const sel = document.getElementById('clubSelect');
        clubs.forEach(c => { const o=document.createElement('option'); o.value=c.club_id; o.textContent=c.club_name; sel.appendChild(o); });
        if (clubs.length===1) { sel.value=clubs[0].club_id; onClubChange(); }
    } catch(e) { console.error(e); }
}
function onClubChange() { if (document.getElementById('clubSelect').value) loadDashboard(); }

// ── Dashboard fetch ───────────────────────────────────────────────
async function loadDashboard() {
    const clubId = paramClub || parseInt(document.getElementById('clubSelect').value);
    if (!clubId) return;

    document.getElementById('loading').style.display     = 'flex';
    document.getElementById('dashContent').style.display = 'none';
    document.getElementById('emptyState').style.display  = 'none';

    const {start,end} = getDateRange();
    try {
        const r = await fetch(`${SUPABASE_URL}/rest/v1/rpc/get_squad_dashboard`, {
            method:'POST', headers:H,
            body: JSON.stringify({p_club_id:clubId, p_start_date:start.toISOString(), p_end_date:end.toISOString()})
        });
        const data = await r.json();
        if (data.error) throw new Error(data.error);
        dashData = data;

        if (paramClub || paramTeam) {
            const parts = [];
            if (data.club_name) parts.push(data.club_name);
            if (paramTeam) { const t=(data.teams||[]).find(t=>t.team_id===paramTeam); if (t) parts.push(t.team_name); }
            if (parts.length) { document.getElementById('ctxLabel').textContent=parts.join(' › '); document.getElementById('ctxLabel').style.display=''; }
        }

        buildFilters();
        applyFilters();
        document.getElementById('dashContent').style.display = 'block';
    } catch(e) {
        document.getElementById('emptyState').style.display = 'block';
        document.getElementById('emptyState').textContent = 'Error: ' + e.message;
        console.error(e);
    } finally {
        document.getElementById('loading').style.display = 'none';
    }
}

// ── Filters ───────────────────────────────────────────────────────
function buildFilters() {
    const codes = new Set();
    for (const t of dashData.teams||[]) for (const s of t.squads||[]) if (s.code) codes.add(s.code);
    allCodes = [...codes].sort();
    if (!allCodes.includes(fCode)) fCode = '';

    if (paramTeam) {
        document.getElementById('teamRow').style.display = 'none';
    } else {
        const withData = new Set((dashData.teams||[]).filter(t=>(t.squads||[]).length>0).map(t=>t.team_id));
        fTeams = withData.size===(dashData.teams||[]).length ? new Set() : new Set([...withData]);
        renderTeamChips();
    }
    renderCodeChips();
}

function renderTeamChips() {
    document.getElementById('teamChips').innerHTML = (dashData.teams||[]).map(t => {
        const active = fTeams.size===0 || fTeams.has(t.team_id);
        return `<span class="t-chip ${active?'active':''}" onclick="toggleTeam(${t.team_id})">${esc(t.team_name)}</span>`;
    }).join('');
}
function toggleTeam(id) {
    const allIds=(dashData.teams||[]).map(t=>t.team_id);
    if (fTeams.size===0) fTeams=new Set(allIds.filter(x=>x!==id));
    else if (fTeams.has(id)) { fTeams.delete(id); if (fTeams.size===0) fTeams=new Set(); }
    else { fTeams.add(id); if (fTeams.size===allIds.length) fTeams=new Set(); }
    renderTeamChips(); applyFilters();
}

function renderCodeChips() {
    const items = ['', ...allCodes];
    document.getElementById('codeChips').innerHTML = items.map(v => {
        const active = fCode===v;
        return `<span class="s-chip ${active?'active':''}" data-val="${esc(v)}" onclick="pickCode(this)">${v||'All'}</span>`;
    }).join('');
}
function pickCode(el) { fCode=el.dataset.val; renderCodeChips(); applyFilters(); }

// ── Filtered data ─────────────────────────────────────────────────
function filteredTeams() {
    if (!dashData) return [];
    return (dashData.teams||[])
        .filter(t => {
            if (paramTeam && t.team_id!==paramTeam) return false;
            if (fTeams.size>0 && !fTeams.has(t.team_id)) return false;
            return true;
        })
        .map(t => ({
            ...t,
            squads: (t.squads||[]).filter(s => !fCode || s.code===fCode)
        }))
        .filter(t => t.squads.length>0);
}

function allFilteredSquads() {
    const squads = [];
    for (const t of filteredTeams()) for (const s of t.squads) squads.push({...s, team_name:t.team_name, team_id:t.team_id});
    return squads;
}

function applyFilters() {
    const teams = filteredTeams();
    renderKPIs(teams);
    drawBarChart(teams);
    renderTeamSections(teams);
}

// ── KPIs ──────────────────────────────────────────────────────────
function renderKPIs(teams) {
    const squads = allFilteredSquads();
    const totalSquads   = squads.length;
    const totalPlayers  = squads.reduce((s,sq)=>s+sq.member_count,0);
    const totalApps     = squads.reduce((s,sq)=>s+sq.match_appearances,0);
    const ratedSquads   = squads.filter(sq=>sq.member_count>0 && sq.acceptance_rate>0);
    const avgRate       = ratedSquads.length>0
        ? ratedSquads.reduce((s,sq)=>s+sq.acceptance_rate,0)/ratedSquads.length : 0;
    const totalTeams    = teams.length;

    document.getElementById('kpiSquads').textContent    = totalSquads;
    document.getElementById('kpiSquadsSub').textContent = `across ${totalTeams} team${totalTeams!==1?'s':''}`;
    document.getElementById('kpiPlayers').textContent   = totalPlayers;
    document.getElementById('kpiPlayersSub').textContent= `${squads.reduce((s,sq)=>Math.max(s,sq.member_count),0)} largest squad`;
    document.getElementById('kpiApps').textContent      = totalApps;
    document.getElementById('kpiAppsSub').textContent   = `match selections in period`;
    document.getElementById('kpiRate').textContent      = avgRate.toFixed(1)+'%';
    document.getElementById('kpiRateSub').textContent   = `${ratedSquads.length} squad${ratedSquads.length!==1?'s':''} with event data`;
}

// ── Bar chart ─────────────────────────────────────────────────────
function setBarMode(m) {
    barMode = m;
    document.querySelectorAll('#barTog .tog').forEach((b,i)=>b.classList.toggle('active',['members','appearances','rate'][i]===m));
    if (dashData) applyFilters();
}

function drawBarChart(teams) {
    const squads = [];
    const teamColorMap = {};
    (dashData.teams||[]).forEach((t,i)=>{ teamColorMap[t.team_id]=PALETTE[i%PALETTE.length]; });

    for (const t of teams) {
        for (const s of t.squads||[]) {
            squads.push({
                label:   s.code ? `${s.squad_name} · ${s.code}` : s.squad_name,
                teamLabel: t.team_name,
                value:   barMode==='members' ? s.member_count : barMode==='appearances' ? s.match_appearances : Number(s.acceptance_rate),
                color:   teamColorMap[t.team_id] || PALETTE[0],
                squad:   s, team: t,
            });
        }
    }

    squads.sort((a,b)=>b.value-a.value);

    const chartHeight = Math.max(240, squads.length*36+40);
    document.getElementById('barWrap').style.height = chartHeight+'px';

    const axisLabel = barMode==='members' ? 'Members' : barMode==='appearances' ? 'Match Appearances' : 'Acceptance Rate (%)';

    if (chartBar) chartBar.destroy();
    if (!squads.length) return;

    chartBar = new Chart(document.getElementById('chartBar'), {
        type:'bar',
        data:{
            labels: squads.map(s=>s.label),
            datasets:[{
                label: axisLabel,
                data:  squads.map(s=>s.value),
                backgroundColor: squads.map(s=>s.color+'bb'),
                borderColor:     squads.map(s=>s.color),
                borderWidth:1, borderRadius:4,
            }]
        },
        options:{
            indexAxis:'y', responsive:true, maintainAspectRatio:false,
            plugins:{
                legend:{display:false},
                tooltip:{callbacks:{
                    title: items => squads[items[0].dataIndex].label + ' — ' + squads[items[0].dataIndex].teamLabel,
                    label: item  => ` ${item.raw}${barMode==='rate'?'%':''} ${axisLabel.toLowerCase()}`
                }}
            },
            scales:{
                x:{
                    beginAtZero:true,
                    max: barMode==='rate' ? 100 : undefined,
                    ticks:{color:'#6B7280',font:{family:'DM Sans',size:10},callback:v=>barMode==='rate'?v+'%':v},
                    grid:{color:'rgba(255,255,255,0.04)'}
                },
                y:{ ticks:{color:'#E7EBEE',font:{family:'DM Sans',size:11}}, grid:{display:false} }
            },
            onClick:(_,els)=>{
                if (els.length>0) {
                    const sq=squads[els[0].index];
                    openDetail(sq.squad, sq.team);
                }
            }
        }
    });
}

// ── Team sections & squad cards ───────────────────────────────────
function renderTeamSections(teams) {
    const teamColorMap = {};
    (dashData.teams||[]).forEach((t,i)=>{ teamColorMap[t.team_id]=PALETTE[i%PALETTE.length]; });

    const container = document.getElementById('teamSections');
    if (!teams.length) { container.innerHTML=`<div class="no-squads">No squad data for the current filters.</div>`; return; }

    container.innerHTML = teams.map(t => {
        const color = teamColorMap[t.team_id] || PALETTE[0];
        const squads = t.squads||[];
        const cards  = squads.map(s => squadCard(s, t)).join('');
        const uniqueMembers = new Set(squads.flatMap(s=>(s.members||[]).map(m=>m.member_id))).size;
        return `
        <div class="team-section">
            <div class="team-section-header">
                <div class="team-color-dot" style="background:${color};"></div>
                <span class="team-section-name">${esc(t.team_name)}</span>
                <span class="team-section-meta">${squads.length} squad${squads.length!==1?'s':''} · ${uniqueMembers} player${uniqueMembers!==1?'s':''}</span>
            </div>
            <div class="squads-grid">${cards}</div>
        </div>`;
    }).join('');
}

function squadCard(s, t) {
    const rc     = rateColor(s.acceptance_rate);
    const hasAtt = s.acceptance_rate > 0;
    return `
    <div class="squad-card" onclick="openDetail(getSquadById(${t.team_id},${s.squad_id},${s.code_id}), getTeamById(${t.team_id}))">
        <div class="squad-card-top">
            <span class="squad-name">${esc(s.squad_name)}</span>
            ${s.code ? `<span class="code-badge">${esc(s.code)}</span>` : ''}
        </div>
        <div class="squad-stats-row">
            <div class="squad-stat">
                <div class="squad-stat-val green">${s.member_count}</div>
                <div class="squad-stat-lbl">Members</div>
            </div>
            ${s.match_appearances>0 ? `<div class="squad-stat">
                <div class="squad-stat-val">${s.match_appearances}</div>
                <div class="squad-stat-lbl">Match Apps</div>
            </div>` : ''}
            ${hasAtt ? `<div class="squad-stat">
                <div class="squad-stat-val ${rc}">${s.acceptance_rate}%</div>
                <div class="squad-stat-lbl">Acceptance</div>
            </div>` : ''}
        </div>
        ${hasAtt ? `
        <div class="rate-bar-bg">
            <div class="rate-bar-fill ${rc}" style="width:${s.acceptance_rate}%;"></div>
        </div>
        <div class="rate-label">
            <span>Acceptance rate</span>
            <span>${s.avg_accepted} avg accepted</span>
        </div>` : '<div style="font-size:11px;color:var(--muted);">No event data in period</div>'}
    </div>`;
}

function getSquadById(teamId, squadId, codeId) {
    const team = (dashData.teams||[]).find(t=>t.team_id===teamId);
    return team ? (team.squads||[]).find(s=>s.squad_id===squadId && s.code_id===codeId) : null;
}
function getTeamById(teamId) { return (dashData.teams||[]).find(t=>t.team_id===teamId); }

// ── Detail panel ──────────────────────────────────────────────────
function openDetail(sq, team) {
    if (!sq || !team) return;
    detailSq   = sq;
    detailSort = 'name';
    detailAsc  = true;

    document.getElementById('dTitle').textContent = sq.squad_name;
    document.getElementById('dMeta').textContent  = [team.team_name, sq.code, sq.grade].filter(Boolean).join(' · ');

    document.getElementById('dStats').innerHTML = `
        <div class="d-stat-item"><div class="d-stat-val green">${sq.member_count}</div><div class="d-stat-lbl">Members</div></div>
        <div class="d-stat-item"><div class="d-stat-val">${sq.match_appearances}</div><div class="d-stat-lbl">Match Apps</div></div>
        ${sq.acceptance_rate>0 ? `<div class="d-stat-item"><div class="d-stat-val ${rateColor(sq.acceptance_rate)}">${sq.acceptance_rate}%</div><div class="d-stat-lbl">Acc. Rate</div></div>` : ''}
        ${sq.avg_accepted>0    ? `<div class="d-stat-item"><div class="d-stat-val">${sq.avg_accepted}</div><div class="d-stat-lbl">Avg Accepted</div></div>` : ''}
    `;

    document.querySelectorAll('.d-sort-btn').forEach(b=>b.classList.toggle('active',b.id===`dsort-${detailSort}`));
    renderDetailList();
    document.getElementById('dOverlay').classList.add('open');
    document.getElementById('dPanel').classList.add('open');
}

function closeDetail() {
    document.getElementById('dOverlay').classList.remove('open');
    document.getElementById('dPanel').classList.remove('open');
}

function setDetailSort(col) {
    if (detailSort===col) detailAsc=!detailAsc;
    else { detailSort=col; detailAsc=col==='name'; }
    document.querySelectorAll('.d-sort-btn').forEach(b=>b.classList.toggle('active',b.id===`dsort-${col}`));
    renderDetailList();
}

function renderDetailList() {
    const members = [...(detailSq.members||[])].sort((a,b) => {
        let va=a[detailSort], vb=b[detailSort];
        if (typeof va==='string') { va=va.toLowerCase(); vb=(vb||'').toLowerCase(); }
        if (va<vb) return detailAsc?-1:1;
        if (va>vb) return detailAsc?1:-1;
        return 0;
    });

    if (!members.length) {
        document.getElementById('dList').innerHTML=`<div class="empty-state">No members in this squad.</div>`;
        return;
    }

    document.getElementById('dList').innerHTML = members.map(m => {
        const ini = m.name.split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();
        const rc  = rateColor(m.rate);
        return `
        <div class="d-member">
            <div class="d-av">${ini}</div>
            <div class="d-info">
                <div class="d-nm">${esc(m.name)}</div>
                <div class="d-rl">${esc(m.role||'')}</div>
            </div>
            <div class="d-cols">
                <div class="d-col">
                    <div class="d-col-val green">${m.accepted}</div>
                    <div class="d-col-lbl">Acc</div>
                </div>
                <div class="d-col">
                    <div class="d-col-val">${m.total_events}</div>
                    <div class="d-col-lbl">Events</div>
                </div>
                <div class="d-col">
                    <div class="d-col-val ${m.total_events>0?rc:''}">
                        ${m.total_events>0 ? m.rate+'%' : '—'}
                    </div>
                    <div class="d-col-lbl">Rate</div>
                </div>
                <div class="d-col">
                    <div class="d-col-val">${m.match_selections||0}</div>
                    <div class="d-col-lbl">Apps</div>
                </div>
            </div>
        </div>`;
    }).join('');
}

// ── Init ──────────────────────────────────────────────────────────
onDateSlider();
loadClubs();
</script>
